# 应用配置文件
app:
  name: "NeoCode"
  version: "1.0.0"

# AI配置
ai:
  provider: "modelscope"
  api_key: ""
  model: "Qwen/Qwen3-Coder-480B-A35B-Instruct"

# 嵌入配置
embedding:
  provider: "modelscope"
  api_key: ""
  model: "BAAI/bge-large-zh-v1.5"

# 内存配置
memory:
  file_path: "./data/memory.json"
  top_k: 5
  min_score: 0.75
  max_items: 1000

# 历史记录配置
history:
  short_term_turns: 6

# 人设配置
persona:
  file_path: "./persona.txt"
